<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات وعدد | النمير</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --main-dark: #0a0e14;
            --card-bg: #161b22;
            --accent-blue: #0077ff;
            --glow: 0 0 20px rgba(0, 119, 255, 0.4);
            --text-white: #f0f6fc;
            --transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--main-dark); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* هيدر احترافي */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(10, 14, 20, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-blue); box-shadow: var(--glow); }
        .logo h1 { font-size: 1.1rem; color: var(--accent-blue); }

        .search-wrapper { position: relative; width: 40%; }
        #searchInput {
            width: 100%;
            padding: 10px 20px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--accent-blue); box-shadow: var(--glow); }

        /* سايدبار */
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
            background: var(--card-bg); z-index: 2000; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 50px 30px; border-left: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar.active { right: 0; }
        .sidebar .close { cursor: pointer; font-size: 1.5rem; margin-bottom: 30px; display: block; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar a:hover { color: var(--accent-blue); }

        /* حاوية المنتجات */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 50px 5%;
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tool-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-blue);
            box-shadow: var(--glow);
        }

        .tool-card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 10px rgba(0, 119, 255, 0.2));
            transition: 0.5s;
        }
        .tool-card:hover img { transform: scale(1.1) rotate(5deg); }

        .tool-card h3 { color: var(--accent-blue); margin-bottom: 15px; font-size: 1.3rem; }
        .tool-card p { opacity: 0.7; font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }

        .order-btn {
            background: transparent;
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 12px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .tool-card:hover .order-btn { background: var(--accent-blue); color: white; }

        /* الموبايل */
        @media (max-width: 768px) {
            .search-wrapper { display: none; } /* يفضل اخفاء البحث الطويل في الهيدر للموبايل */
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="close" id="closeSidebar"><i class="fa-solid fa-xmark"></i></div>
        <a href="../index.html"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a href="sanfara.html"><i class="fa-solid fa-layer-group"></i> قسم الصنفرة</a>
        <a href="https://wa.me/2001062718718" style="color: #25d366;"><i class="fa-brands fa-whatsapp"></i> واتساب</a>
    </div>

    <header>
        <div class="logo">
            <img src="../image/logo (2).png" alt="النمير">
            <h1>العدد والمعدات</h1>
        </div>
        
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="ابحث عن أداة...">
        </div>

        <div style="cursor:pointer; font-size: 1.5rem;" id="openSidebar">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
    </header>

    <div class="container" id="cardsGrid">
        <div class="tool-card">
            <div class="img-area">
                <img src="../image/repair-tools.png" alt="أدوات">
            </div>
            <div class="info-area">
                <h3>أطقم فرش ودهان</h3>
                <p>فرش احترافية ورولات دهان تضمن توزيعاً مثالياً للون على كافة الأسطح.</p>
            </div>
            <a href="https://wa.me/2001062718718" class="order-btn">اطلب الآن</a>
        </div>

        <div class="tool-card">
            <div class="img-area">
                <img src="../image/sanding-machine.png" alt="معدات">
            </div>
            <div class="info-area">
                <h3>معدات رش هوائية</h3>
                <p>أجهزة رش دهان حديثة (كمبروسر) لسرعة الإنجاز وجودة التشطيب الفائق.</p>
            </div>
            <a href="https://wa.me/2001062718718" class="order-btn">اطلب الآن</a>
        </div>
    </div>

    <script>
        // 1. التحكم في السايدبار
        const sidebar = document.getElementById('sidebar');
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');

        openBtn.onclick = () => sidebar.classList.add('active');
        closeBtn.onclick = () => sidebar.classList.remove('active');

        // 2. نظام البحث اللحظي
        document.getElementById("searchInput").oninput = function() {
            let filter = this.value.toLowerCase();
            let cards = document.querySelectorAll(".tool-card");
            
            cards.forEach(card => {
                let text = card.innerText.toLowerCase();
                if(text.includes(filter)) {
                    card.style.display = "flex";
                    card.style.animation = "fadeIn 0.5s ease";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // إغلاق السايدبار عند الضغط في الخارج
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !openBtn.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });
    </script>
</body>
</html>
