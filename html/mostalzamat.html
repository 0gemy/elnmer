<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مستلزمات المراكب | النمير</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --main-dark: #0a0e14;
      --card-bg: #161b22;
      --accent-blue: #0077ff;
      --text-white: #f0f6fc;
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body { 
      background-color: var(--main-dark); 
      font-family: 'Segoe UI', sans-serif;
      color: var(--text-white);
      margin: 0;
    }

    /* Header matching Index */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 5%; background: rgba(10, 14, 20, 0.9);
      backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo { display: flex; align-items: center; gap: 15px; }
    .logo img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent-blue); }
    .logo-text h1 { font-size: 1.1rem; color: var(--accent-blue); margin: 0; }

    .search-box { position: relative; flex: 0.5; margin: 0 20px; }
    .search-box input { 
      width: 100%; padding: 10px 40px 10px 15px; border-radius: 20px;
      background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white;
    }
    .search-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--accent-blue); }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
      background: var(--card-bg); z-index: 2000; transition: 0.5s; padding: 40px 20px;
    }
    .sidebar.active { right: 0; }
    .sidebar a { display: block; color: white; text-decoration: none; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    .hero-section {
      text-align: center; padding: 60px 20px;
      background: linear-gradient(rgba(10, 14, 20, 0.8), rgba(10, 14, 20, 0.8)), url('../image/img60.jpg');
      background-size: cover; background-position: center; margin-bottom: 40px;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .marine-card {
      background: var(--card-bg); border-radius: 30px; overflow: hidden;
      display: flex; align-items: center; gap: 30px; padding: 30px;
      border: 1px solid rgba(255,255,255,0.05); transition: var(--transition);
    }
    .marine-card:hover { transform: scale(1.02); border-color: var(--accent-blue); box-shadow: 0 0 30px rgba(0, 119, 255, 0.2); }
    .marine-card img { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 0 10px var(--accent-blue)); }
    
    .card-content h3 { font-size: 2rem; color: var(--accent-blue); margin-bottom: 15px; }
    .card-content p { font-size: 1.1rem; opacity: 0.8; line-height: 1.8; }

    .whatsapp-btn {
      background: #25d366; color: white; padding: 12px 30px; border-radius: 25px;
      text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 10px;
      margin-top: 20px; transition: 0.3s;
    }
    .whatsapp-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }

    @media (max-width: 768px) {
      .marine-card { flex-direction: column; text-align: center; }
      .search-box { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="../image/logo (2).png" alt="النمير">
      <div class="logo-text"><h1>النمير للمستلزمات البحرية</h1></div>
    </div>
    <div class="search-box">
      <input type="text" placeholder="بحث في مستلزمات المراكب...">
      <i class="fa-solid fa-search"></i>
    </div>
    <div id="menuBtn" style="cursor:pointer"><i class="fa-solid fa-bars-staggered fa-2x"></i></div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div id="closeBtn" style="cursor:pointer; margin-bottom: 30px;"><i class="fa-solid fa-xmark fa-2x"></i></div>
    <a href="../index.html"><i class="fa-solid fa-house"></i> الرئيسية</a>
    <a href="fawleng.html"><i class="fa-solid fa-ship"></i> دهانات الفاولينج</a>
    <a href="prodacts.html"><i class="fa-solid fa-box"></i> المنتجات</a>
  </nav>

  <section class="hero-section">
    <h1>معدات وبحرية احترافية</h1>
    <p>كل ما تحتاجه لصيانة وتجهيز مركبك في مكان واحد</p>
  </section>

  <div class="container">
    <div class="marine-card">
      <img src="../image/cruise.png" alt="إكسسوارات بحرية">
      <div class="card-content">
        <h3>إكسسوارات بحرية فاخرة</h3>
        <p>تشكيلة واسعة من مستلزمات السفن والمراكب بأعلى جودة عالمية. نضمن لك المقاومة الكاملة للملوحة والعوامل الجوية الصعبة.</p>
        <a href="https://wa.me/2001062718718" class="whatsapp-btn">
          <i class="fa-brands fa-whatsapp"></i> استفسار عبر واتساب
        </a>
      </div>
    </div>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    const closeBtn = document.getElementById("closeBtn");

    menuBtn.onclick = (e) => { e.stopPropagation(); sidebar.classList.add("active"); }
    closeBtn.onclick = () => { sidebar.classList.remove("active"); }
    document.onclick = (e) => { if(!sidebar.contains(e.target) && e.target !== menuBtn) sidebar.classList.remove("active"); }
  </script>
</body>
</html>
