<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>قسم الصنفرة والعدد | النمير</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --main-dark: #0a0e14;
      --card-bg: #161b22;
      --accent-blue: #0077ff;
    }

    body { background-color: var(--main-dark); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; }

    .header-minimal {
      padding: 30px 5%; display: flex; justify-content: space-between; align-items: center;
    }

    .tool-hero {
      display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px;
    }

    .tool-card {
      background: var(--card-bg); width: 100%; max-width: 900px;
      border-radius: 40px; padding: 50px; border: 1px solid rgba(255,255,255,0.05);
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .tool-image {
      background: radial-gradient(circle, rgba(0, 119, 255, 0.2) 0%, transparent 70%);
      padding: 20px; border-radius: 30px; text-align: center;
    }

    .tool-image img { width: 100%; filter: drop-shadow(0 0 20px var(--accent-blue)); animation: float 3s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .tool-info h1 { font-size: 2.5rem; color: var(--accent-blue); margin-bottom: 20px; }
    .tool-info p { font-size: 1.2rem; opacity: 0.8; line-height: 1.8; margin-bottom: 30px; }

    .feature-list { list-style: none; padding: 0; margin-bottom: 30px; }
    .feature-list li { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .feature-list i { color: var(--accent-blue); }

    .order-now {
      background: var(--accent-blue); color: white; text-decoration: none;
      padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 1.1rem;
      display: inline-block; transition: 0.3s;
    }
    .order-now:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--accent-blue); }

    @media (max-width: 768px) {
      .tool-card { grid-template-columns: 1fr; text-align: center; padding: 30px; }
      .feature-list li { justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="header-minimal">
    <div class="logo">
        <a href="../index.html"><img src="../image/logo (2).png" alt="النمير" style="width: 60px;"></a>
    </div>
    <div class="tagline">النمير للصنفرة والعدد</div>
  </div>

  <main class="tool-hero">
    <div class="tool-card">
      <div class="tool-image">
        <img src="../image/sanding-machine.png" alt="صنفرة">
      </div>
      <div class="tool-info">
        <h1>صنفرة ديسك تركي</h1>
        <p>نقدم لك أجود أنواع الصنفرة التركية الأصلية، المصممة للخدمة الشاقة في أصعب الظروف الخشبية والمعدنية.</p>
        <ul class="feature-list">
            <li><i class="fa-solid fa-circle-check"></i> عمر افتراضي طويل</li>
            <li><i class="fa-solid fa-circle-check"></i> متوفرة بجميع درجات الخشونة</li>
            <li><i class="fa-solid fa-circle-check"></i> أداء ثابت ومثالي</li>
        </ul>
        <a href="https://wa.me/2001062718718" class="order-now">اطلب المنتج الآن</a>
      </div>
    </div>
  </main>

</body>
</html>
